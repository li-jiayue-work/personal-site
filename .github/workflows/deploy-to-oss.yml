name: Deploy to Alibaba Cloud OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 安装 Node.js 20 ────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 3. 安装依赖 ────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. 构建静态站点 ────────────────────────
      - name: Build
        run: npm run build

      # ── 5. 验证构建产物 ────────────────────────
      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "❌ Build failed: 'out' directory not found"
            exit 1
          fi
          echo "📦 Build output size: $(du -sh out | cut -f1)"
          echo "📄 Files: $(find out -type f | wc -l)"
          echo "✅ Build verification passed"

      # ── 6. 安装并配置 ossutil ──────────────────
      - name: Setup ossutil
        uses: manyuanrong/setup-ossutil@v3
        with:
          endpoint: oss-cn-hongkong.aliyuncs.com
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      # ── 7. 增量同步到 OSS（自动清理远端旧文件） ──
      - name: Deploy to OSS
        run: |
          ossutil sync out/ oss://my-personal-site/ \
            --delete \
            --force
          echo "🚀 Deployed to OSS successfully"

      # ── 8. 部署摘要 ────────────────────────────
      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Deployment completed"
          echo "  🌐 Bucket: my-personal-site"
          echo "  📍 Region: oss-cn-hongkong"
          echo "  🕐 Time:   $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
