name: Deploy to Alibaba Cloud OSS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --webpack

      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "❌ Build failed: 'out' directory not found"
            exit 1
          fi
          echo "✅ $(find out -type f | wc -l) files ready"

      - name: Deploy to OSS via Python
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          pip install oss2 --quiet
          python3 << 'PYEOF'
          import oss2, os, mimetypes
          from pathlib import Path

          auth = oss2.Auth(os.environ['OSS_ACCESS_KEY_ID'], os.environ['OSS_ACCESS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, 'https://oss-cn-hongkong.aliyuncs.com', 'my-personal-site')

          out_dir = Path('out')
          uploaded = 0
          for f in out_dir.rglob('*'):
              if f.is_file():
                  key = str(f.relative_to(out_dir))
                  mime = mimetypes.guess_type(str(f))[0] or 'application/octet-stream'
                  bucket.put_object_from_file(key, str(f), headers={'Content-Type': mime})
                  uploaded += 1
                  if uploaded % 20 == 0:
                      print(f'  uploaded {uploaded} files...')

          print(f'🚀 Done! {uploaded} files deployed to OSS.')
          PYEOF
