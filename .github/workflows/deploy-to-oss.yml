name: Deploy to Alibaba Cloud OSS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --webpack

      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "❌ Build failed: 'out' directory not found"
            exit 1
          fi
          echo "✅ Build output: $(du -sh out | cut -f1), $(find out -type f | wc -l) files"

      - name: Install ossutil
        run: |
          wget --tries=5 --waitretry=3 -q \
            https://github.com/aliyun/ossutil/releases/download/v1.7.19/ossutil-v1.7.19-linux-amd64.zip \
            -O ossutil.zip
          unzip -q ossutil.zip
          sudo mv ossutil-v1.7.19-linux-amd64/ossutil /usr/local/bin/ossutil
          ossutil version

      - name: Deploy to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          ossutil config -e oss-cn-hongkong.aliyuncs.com \
                         -i $OSS_ACCESS_KEY_ID \
                         -k $OSS_ACCESS_KEY_SECRET
          ossutil sync out/ oss://my-personal-site/ --delete -f
          echo "🚀 Deployed successfully"
