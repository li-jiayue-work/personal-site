name: Deploy to Alibaba Cloud OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "❌ Build failed: 'out' directory not found"
            exit 1
          fi
          echo "📦 Build output: $(du -sh out | cut -f1)"
          echo "📄 File count: $(find out -type f | wc -l)"
          echo "✅ Build verification passed"

      - name: Deploy to OSS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          # Force virtual-hosted-style — required by HK OSS, path-style gets SecondLevelDomainForbidden
          aws configure set default.s3.addressing_style virtual
          aws s3 sync out/ s3://my-personal-site/ \
            --delete \
            --endpoint-url=https://oss-cn-hongkong.aliyuncs.com
          echo "🚀 Deployed to OSS successfully"

      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Deployment completed"
          echo "  🌐 Bucket:  my-personal-site"
          echo "  📍 Region:  oss-cn-hongkong"
          echo "  🕐 Time:    $(date -u)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
