name: Deploy to Alibaba Cloud OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --webpack

      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "❌ Build failed: 'out' directory not found"
            exit 1
          fi
          echo "📦 Build output: $(du -sh out | cut -f1)"
          echo "📄 File count: $(find out -type f | wc -l)"
          echo "✅ Build verification passed"

      - name: Install ossutil
        run: |
          curl -fsSL -o /usr/local/bin/ossutil https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64
          chmod +x /usr/local/bin/ossutil
          ossutil version

      - name: Deploy to OSS
        run: |
          ossutil sync out/ oss://my-personal-site/ \
            --delete -f \
            -e oss-cn-hongkong.aliyuncs.com \
            -i "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            -k "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"
          echo "🚀 Deployed to OSS successfully"

      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Deployment completed"
          echo "  🌐 Bucket:  my-personal-site"
          echo "  📍 Region:  oss-cn-hongkong"
          echo "  🕐 Time:    $(date -u)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
